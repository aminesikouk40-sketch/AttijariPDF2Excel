<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attijari PDF → Excel</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📄 Attijari PDF → Excel</h1>

    <p class="subtitle">
        Convertissez votre relevé Attijariwafa Bank en Excel en quelques secondes.
    </p>

    <div class="drop-zone" id="dropZone">

        <div class="icon">
            📁
        </div>

        <p>
            Glissez votre fichier PDF ici
        </p>

        <span>ou</span>

        <input type="file" id="pdf" accept=".pdf" hidden>

        <button onclick="document.getElementById('pdf').click()">
            Choisir un PDF
        </button>

        <div id="filename"></div>

    </div>

    <button class="convert-btn" onclick="convertir()">
        Convertir
    </button>

    <div id="loader"></div>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>

</html>
